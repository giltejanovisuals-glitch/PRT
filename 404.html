  />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="manifest" href="site.webmanifest" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link

  />

  <style>
    /* Page-specific layout only - colors, fonts, and buttons all reuse
       the shared design system from css/style.css. */
    .not-found {
      min-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 24px;
      padding: 60px 24px;
    }

    .not-found-code {
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 500;
      font-size: clamp(64px, 14vw, 160px);
      line-height: 1;
      color: var(--accent-light);
    }

    .not-found-title {
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 800;
      letter-spacing: -0.3px;
      max-width: 520px;
    }

    .not-found-copy {
      max-width: 440px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <main class="portfolio-page" id="main-content">
    <header class="site-header">
      <div class="brand-label">
        <span>Portfolio</span>
        <div class="line"></div>
      </div>
    </header>

    <section class="not-found">
      <span class="not-found-code" aria-hidden="true">404</span>

      <h1 class="not-found-title">This page wandered outside the artboard.</h1>

      <p class="not-found-copy">
        The link might be broken, or the page may have moved. Let's get you
        back to the work.
      </p>

      <div class="contact-actions">
        <a href="/" class="cta-button">
          Back to Homepage
          <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
        </a>
      </div>
    </section>

    <footer class="site-footer">
      <p><span class="footer-name">Gil Tejano Culas</span> | Creative Specialist / Graphic Designer</p>
      <p>&copy; 2026 · Premium product visuals for product-based brands.</p>
    </footer>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
